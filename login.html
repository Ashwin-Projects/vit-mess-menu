<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIT MessIt | Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-bg">

    <div class="container py-5">
        <div class="row align-items-center justify-content-center min-vh-100">
            <div class="col-md-5 col-lg-4">
                
                <div class="text-center mb-5">
                    <h2 class="fw-bold text-primary mb-2">VIT MessIt 🍽️</h2>
                    <p class="text-muted small">The modern companion for VIT students.</p>
                </div>

                <div class="card border-0 shadow-lg p-2 rounded-4">
                    <div class="card-body p-4 p-lg-5">
                        <div class="text-start mb-4">
                            <h4 class="fw-bold mb-1">Welcome 👋</h4>
                            <p class="text-muted small">Sign in to view your mess menu.</p>
                        </div>
                        
                        <div class="btn-group w-100 mb-4" role="group" aria-label="Choose auth mode">
                            <button type="button" class="btn btn-primary" id="loginModeBtn" onclick="showAuthForm('login')">Login</button>
                            <button type="button" class="btn btn-outline-primary" id="registerModeBtn" onclick="showAuthForm('register')">Register</button>
                        </div>

                        <div class="alert alert-danger d-none small" id="authMessage" role="alert"></div>

                        <form id="authForm" novalidate onsubmit="return handleLogin(event)">
                            <div class="mb-3">
                                <label for="regNo" class="form-label small fw-bold text-muted">Registration Number</label>
                                <input type="text" class="form-control form-control-lg bg-light border-0 fs-6" id="regNo" placeholder="e.g. 21BCE1234" required pattern="[0-9]{2}[A-Z]{3}[0-9]{4}" oninput="this.value = this.value.toUpperCase()">
                                <div class="invalid-feedback small">Format: 21BCE1234.</div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label small fw-bold text-muted">Password</label>
                                <input type="password" class="form-control form-control-lg bg-light border-0 fs-6" id="password" required minlength="6" placeholder="••••••••">
                                <div class="invalid-feedback small">Min 6 characters.</div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-bold shadow-sm">Sign In</button>
                        </form>

                        <form id="registerForm" class="d-none" novalidate onsubmit="return handleRegister(event)">
                            <div class="mb-3">
                                <label for="registerName" class="form-label small fw-bold text-muted">Full Name</label>
                                <input type="text" class="form-control form-control-lg bg-light border-0 fs-6" id="registerName" placeholder="Your name" required minlength="2">
                                <div class="invalid-feedback small">Enter your name.</div>
                            </div>

                            <div class="mb-3">
                                <label for="registerRegNo" class="form-label small fw-bold text-muted">Registration Number</label>
                                <input type="text" class="form-control form-control-lg bg-light border-0 fs-6" id="registerRegNo" placeholder="e.g. 21BCE1234" required pattern="[0-9]{2}[A-Z]{3}[0-9]{4}" oninput="this.value = this.value.toUpperCase()">
                                <div class="invalid-feedback small">Format: 21BCE1234.</div>
                            </div>

                            <div class="mb-4">
                                <label for="registerPassword" class="form-label small fw-bold text-muted">Password</label>
                                <input type="password" class="form-control form-control-lg bg-light border-0 fs-6" id="registerPassword" required minlength="6" placeholder="Minimum 6 characters">
                                <div class="invalid-feedback small">Min 6 characters.</div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-bold shadow-sm">Create Account</button>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-4 text-muted small">
                    Built for VIT Students · 2024
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
