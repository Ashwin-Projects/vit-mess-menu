<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 30px;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
        }
        .nav-links a.logout {
            color: #dc3545;
        }
        .header-section {
            background: var(--primary);
            color: white;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body class="bg-light">

    <div class="page-container">
        <!-- Simplified Nav -->
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="home.html">Today's Menu</a>
            <a href="weekly.html">Weekly Schedule</a>
            <a href="favorites.html">Favorite Food</a>
            <a href="login.html" class="logout" onclick="clearUserSession()">Logout</a>
        </div>

        <header class="header-section shadow-sm">
            <h1 class="fw-bold mb-1">Today's Menu</h1>
            <p class="text-white-50 small mb-4" id="todayDateDisplay">Loading date...</p>

            <div class="bg-white p-2 d-inline-flex rounded-3">
                <input type="radio" class="btn-check" name="messTypeRadio" id="messVeg" value="Veg" onchange="changeMessType(this.value)">
                <label class="btn btn-outline-success rounded-2 border-0 fw-bold px-4" for="messVeg">Veg</label>

                <input type="radio" class="btn-check" name="messTypeRadio" id="messNonVeg" value="NonVeg" onchange="changeMessType(this.value)">
                <label class="btn btn-outline-danger rounded-2 border-0 fw-bold px-4 mx-1" for="messNonVeg">Non-Veg</label>

                <input type="radio" class="btn-check" name="messTypeRadio" id="messSpecial" value="Special" onchange="changeMessType(this.value)">
                <label class="btn btn-outline-warning rounded-2 border-0 fw-bold px-4 text-dark" for="messSpecial">Special</label>
            </div>
        </header>

        <main id="todayMenuContainer" class="row g-4 mb-5">
            <!-- Dynamic menu -->
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
